<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css" />
    <title>Course organiser</title>
  </head>
  <body>
    <header>
      <h2>course organizer</h2>
      <ul>
        <li><a href="index.html">home</a></li>
        <li><a href="courses.html">my courses</a></li>
        <li><a href="add.html">add courses</a></li>
        <li><a href="contact.html">contact us</a></li>
      </ul>
    </header>
    <main class="contact-main">
      <section class="info">
        <h3>contact info</h3>
        <p class="title-p">feel free to contact us</p>
        <div class="details">
          <div class="item">
            <i class="fas fa-envelope"></i>
            <span>student@gmail.com</span>
          </div>
          <div class="item">
            <i class="fas fa-phone"></i>
            <span>+201100000000</span>
          </div>
          <div class="item">
            <i class="fas fa-location-dot"></i>
            <span>Helwan, Cairo</span>
          </div>
        </div>
      </section>
      <section class="form">
        <h2>Send a Message</h2>
        <form>
          <label for="user-name">Full Name</label>
          <input type="text" id="user-name" placeholder="Enter your name..." />
          <label for="user-email">Email Address</label>
          <input type="email" id="user-email" placeholder="example@mail.com" />
          <label for="user-msg">Your Message</label>
          <textarea id="user-msg" placeholder="How can we help you?"></textarea>
          <div class="but4">
          <button type="submit" class="send-btn">Send Now</button>
          </div>
        </form>
      </section>
    </main>
    <footer class="footer4">
        <p>&copy; all rights reserved 2026</p>
    </footer>
  </body>
</html>
