<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Course organizer</title>
  </head>
  <body>
    <div class="container">
    <header>
      <h2>course organizer</h2>
      <ul>
        <li><a href="index.html">home</a></li>
        <li><a href="courses.html">my courses</a></li>
        <li><a href="add.html">add courses</a></li>
        <li><a href="contact.html">contact us</a></li>
      </ul>
    </header>
    <main class="main3">
        <h2>enter a new course</h2>
        <section>
            <form>
                <label for="course" >course name</label>
                <input type="text" id="course" placeholder="Enter course name...">
                <label for="ins">instructor</label>
                <input type="text" id="ins" placeholder="Enter instructor name...">
                <label for="h">credit hours</label>
                <input type="number" min="1" max="5" id="h" placeholder="Enter credit hours...">
                <label for="n">notes</label>
                <textarea name="" id="n" placeholder="Type your notes..."></textarea >
                  <div class="but3">
                    <button>add course</button>  
                  </div>
                
            </form>
        </section>
    </main>
    <div class="foot3">

    </div>
    </div>
